<!DOCTYPE html>
<html>
<head>
    <title>Men Hairstyles</title>
    <style>

    /* Universal Button Style (Same as Welcome Page) */

button:hover {

}
/* Center buttons properly */
.action-buttons {
    display: flex;

}

        #previewImage {
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);

            max-width: 480px;

        }

        .recommendations {
            display: grid;
            grid-template-columns: 1fr;   /* One per row */
            gap: 30px;
            margin-top: 40px;
        }

        .recommendation-card {
            background: white;

            text-align: center;
        }

        .recommendation-card img {
            width: 100%;
            height: 700px; /* Increased image height */
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        #result {
            text-align: center;
            margin: 20px 0;
            font-size: 1.2rem;
            color: #2d3748;
        }
        /* Suggestion Section */
.suggestion-section {
    margin-top: 50px;
    padding: 30px;
    background: linear-gradient(135deg, #fdfbfb, #ebedee);
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
}

.suggestion-section h2 {
    margin-bottom: 20px;
    font-size: 1.8rem;
    color: #2d3748;
}

.suggestion-container {
    display: flex;
    align-items: center;

}

.suggestion-images {

}

.suggestion-images img {

    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
}

.suggestion-images img:hover {
    transform: scale(1.05);

    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
</head>
<body>
    <div class="navbar">
        <div class="logo">AI Hair Studio</div>
        <div class="nav-links">
            <a href="/index">Home</a>
        </div>
    </div>
    <div class="container">
        <h1>Men Hairstyles</h1>
        <div class="camera-section">
            <div class="video-container">
                <video id="video" width="480" height="360" autoplay playsinline style="display:none; transform: scaleX(-1);"></video>
            </div>
            <canvas id="canvas" width="480" height="360"></canvas>
            <img id="previewImage" style="display: none;">
            <div class="action-buttons">
                <button id="captureButton">Capture Image</button>
                <button id="uploadButton">Upload Image</button>
            </div>
            <input type="file" id="imageUpload" accept="image/*" style="display:none;">
        </div>
        <div id="result"></div>
        <div id="recommendations"></div>
    </div>
    <!-- Suggestion Section -->
<!-- Suggestion Section -->
<div class="suggestion-section" id="suggestionSection" style="display:none;">
    <h2>✨ Explore More Hairstyles</h2>

    <div class="suggestion-container">
        <button class="swipe-btn" onclick="previousSuggestion()">❮</button>

        <div class="suggestion-images">
            <img id="suggestionImage1">
            <img id="suggestionImage2">
            <img id="suggestionImage3">
        </div>

        <button class="swipe-btn" onclick="nextSuggestion()">❯</button>
    </div>
</div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');
        let stream;

        // Capture Image Button
        document.getElementById('captureButton').addEventListener('click', async function() {
            if (!stream) {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    video.srcObject = stream;
                    video.style.display = 'block';
                    document.getElementById('captureButton').textContent = 'Snap Photo';
                    document.getElementById('uploadButton').style.display = 'none';
                } catch (err) {
                    console.error('Error accessing camera:', err);
                    alert("Unable to access camera.");
                    return;
                }
            } else {
                // Flip image correctly before capture
                context.save();
                context.scale(-1, 1);
                context.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
                context.restore();
                const imageDataUrl = canvas.toDataURL('image/jpeg',0.6);
                processImage(imageDataUrl);
                video.style.display = 'none';
                document.getElementById('captureButton').textContent = 'Capture Image';
                document.getElementById('uploadButton').style.display = 'block';
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
        });

        // Upload Image Button
        document.getElementById('uploadButton').addEventListener('click', function() {
            document.getElementById('imageUpload').click();
        });

        // Handle Image Upload
        document.getElementById('imageUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    processImage(event.target.result);
                };
                reader.readAsDataURL(file);
            }
        });

        // Process Image and Fetch Recommendations
       function processImage(imageData) {
    const previewImage = document.getElementById('previewImage');

    // Show preview
    previewImage.src = imageData;
    previewImage.style.display = 'block';

    // Send image directly to Flask backend
    fetch('/process_image', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: new URLSearchParams({
            'image': imageData,
            'gender': window.location.pathname.includes("women") ? 'women' : 'men'
        })
    })
    .then(response => response.json())
    .then(data => {

        if (data.error) {
            document.getElementById('result').textContent = data.error;
            return;
        }

        // Face Details
        document.getElementById('result').innerHTML = `
            <strong>Face Shape:</strong> ${data.face_shape}<br>
            <strong>Hair Density:</strong> ${data.hair_density}<br>
            <strong>Hair Type:</strong> ${data.hair_type}
        `;

        // Recommendations
        let recommendationsHtml = '<div class="recommendations">';

        data.recommendations.forEach(recommendation => {

            let steps = recommendation.procedure
                .split(/\d+\.\s/)
                .filter(step => step.trim() !== '');

            let stepsHtml = '<ol>';

            steps.forEach(step => {
                stepsHtml += `<li>${step.trim()}</li>`;
            });

            stepsHtml += '</ol>';

            recommendationsHtml += `
                <div class="recommendation-card">
                    <img src="${recommendation.img}" alt="${recommendation.name}">
                    <h4>${recommendation.name}</h4>
                    ${stepsHtml}
                </div>
            `;
        });

        recommendationsHtml += '</div>';

        document.getElementById('recommendations').innerHTML = recommendationsHtml;

        showSuggestionSection();
    })
    .catch(error => {
        console.error('Error:', error);
        document.getElementById('result').textContent = 'Error processing image.';
    });
}
        const hairstyleSuggestions = [
            "https://i.pinimg.com/736x/c1/3c/d4/c13cd4b116dcb71e324e04ddae3ceaf5.jpg",
            "https://i.pinimg.com/736x/b6/77/82/b67782e2887c3cdd90b4d704324e2b42.jpg",
            "https://i.pinimg.com/736x/05/48/e6/0548e60ca77d5d376ab871df86aca1ad.jpg",
            "https://i.pinimg.com/736x/3d/c9/a5/3dc9a57a0e3f682bbc04524ce038e911.jpg",
            "https://i.pinimg.com/736x/93/05/d9/9305d96e2d6686b0a986931bf6d2b3f0.jpg"
        ];
        function loadRandomSuggestions() {
            const shuffled = hairstyleSuggestions.sort(() => 0.5 - Math.random());
            document.getElementById("suggestionImage1").src = shuffled[0];
            document.getElementById("suggestionImage2").src = shuffled[1];
            document.getElementById("suggestionImage3").src = shuffled[2];
        }

        function nextSuggestion() {
            loadRandomSuggestions();
        }

        function previousSuggestion() {
            loadRandomSuggestions();
        }

        function showSuggestionSection() {
    const suggestion = document.getElementById("suggestionSection");
    suggestion.style.display = "block";
    suggestion.style.opacity = "0";

    setTimeout(() => {
        suggestion.style.transition = "0.6s ease";
        suggestion.style.opacity = "1";
    }, 100);

    loadRandomSuggestions();
}
        window.onload = loadRandomSuggestions;

    </script>
</body>
</html>
