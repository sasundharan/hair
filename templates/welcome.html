<!DOCTYPE html>
<html>
<head>
    <title>Welcome to Hair Style Advisor</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -1px;
        }

       /* Universal Button Style (Same as Welcome Page) */
button {
    padding: 12px 20px;
    margin: 10px 5px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    background-color: #007bff;
    color: white;
    border: none;
    font-weight: 500;
    letter-spacing: 0.5px;
}

/* Hover Effect */
button:hover {
    background-color: #0056b3;
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
}

/* Center buttons properly */
.action-buttons {
    display: flex;
    gap: 15px;
    justify-content: center;
    margin-top: 20px;
}

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2rem;
            }

            button {
                width: 100%;
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<div class="navbar">
    <div class="logo">AI Hair Studio</div>
    <div class="nav-links">
        <a href="/index">Home</a>
    </div>
</div>

<div class="container">
    <h1>Welcome to AI Hair Style Advisor</h1>
    <p>Smart Hairstyle Recommendations Using AI</p>
    <br>
    <button class="btn" onclick="window.location.href='/index'">
        Get Started
    </button>
</div>
</body>
</html>
